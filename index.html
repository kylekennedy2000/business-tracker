<!DOCTYPE html>
<html>
<head>
  <title>Edmonton Business Map</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<div style="position:absolute; z-index:1000; top:10px; right:10px; background:white; padding:10px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

  <button onclick="toggleNew()" id="toggleBtn">Show Only New</button>
  <button onclick="refreshData()">Reload Map</button>

  <div style="margin-top:8px; font-size:12px;">
    🔵 Existing<br>
    🔴 New (within selected range)
  </div>

  <div style="margin-top:8px;">
    <button onclick="setDays(7)">7 Days</button>
    <button onclick="setDays(30)">30 Days</button>
    <button onclick="setDays(90)">90 Days</button>
  </div>

  <div style="margin-top:6px; font-size:12px;" id="filterLabel">
    Showing last 30 days
  </div>

  <div style="margin-top:6px; font-size:12px;">
    Last Updated: <span id="lastUpdated">Loading...</span>
  </div>

  <div style="font-size:12px;">
    New Businesses: <span id="newCount">0</span>
  </div>

</div>

<div id="map" style="height: 100vh;"></div>

<script>

var map = L.map('map').setView([53.5461, -113.4938], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

var showOnlyNew = true;
var daysFilter = 30;
var allMarkers = [];

function toggleNew() {
  showOnlyNew = !showOnlyNew;

  document.getElementById("toggleBtn").innerText =
    showOnlyNew ? "Show All Businesses" : "Show Only New";

  renderMarkers();
}

function setDays(days) {
  daysFilter = days;
  document.getElementById("filterLabel").innerText = "Showing last " + days + " days";
  renderMarkers();
}

function refreshData() {
  location.reload();
}

let businessData = [];

fetch('old_businesses.json')
  .then(res => res.json())
  .then(data => {
    businessData = data;

    const now = new Date();
    document.getElementById("lastUpdated").innerText = now.toLocaleString();

    // Set correct button label on load
    document.getElementById("toggleBtn").innerText = "Show All Businesses";

    renderMarkers();
  });

function renderMarkers() {

  // Clear markers
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];

  const today = new Date();
  let newCount = 0;
  let newMarkers = [];

  businessData.forEach(b => {
    if (!b.lat || !b.lon) return;

    const addedDate = new Date(b.date_added);
    const diffDays = (today - addedDate) / (1000 * 60 * 60 * 24);

    const isNew = diffDays <= daysFilter;

    if (showOnlyNew && !isNew) return;

    if (isNew) newCount++;

    var color = isNew ? "red" : "blue";
    var radius = isNew ? 10 : 3;

    var marker = L.circleMarker([b.lat, b.lon], {
      radius: radius,
      color: color
    }).addTo(map);

    marker.bindPopup(
      "<b>" + b.name + "</b><br>" +
      "Added: " + b.date_added + "<br>" +
      (isNew ? "NEW" : "Existing")
    );

    allMarkers.push(marker);

    if (isNew) newMarkers.push(marker);
  });

  // Update counter
  document.getElementById("newCount").innerText = newCount;

  // Auto zoom to new businesses
  if (newMarkers.length > 0) {
    var group = new L.featureGroup(newMarkers);
    map.fitBounds(group.getBounds());
  }
}

</script>

</body>
</html>
